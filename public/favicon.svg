<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Gradiente do corpo azul do Papa-léguas -->
    <linearGradient id="runnerBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#1e40af" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Gradiente laranja/âmbar para o bico longo -->
    <linearGradient id="runnerOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
  </defs>

  <!-- Grupo do Ícone Geométrico -->
  <g id="favicon-runner">
    <!-- Pescoço Angular -->
    <polygon points="38,90 48,54 58,56 48,90" fill="url(#runnerBlue)" />

    <!-- Crista de Spoiler Geométrico (3 plumas angulares) -->
    <polygon points="44,42 22,28 12,12 30,28" fill="#1e40af" />
    <polygon points="46,40 30,18 20,4 38,22" fill="#06b6d4" />
    <polygon points="48,38 38,12 30,0 44,18" fill="url(#runnerOrange)" />

    <!-- Cabeça Geométrica -->
    <polygon points="40,54 48,38 66,40 64,58 50,58" fill="url(#runnerBlue)" />

    <!-- Olho Normal Oval (tradicional e esperto) -->
    <ellipse cx="54" cy="46" rx="5.5" ry="9" fill="#ffffff" stroke="#1e3a8a" stroke-width="1.2" />
    <!-- Pupila -->
    <ellipse cx="55.5" cy="47" rx="2.5" ry="4.5" fill="#000000" />
    <!-- Brilho do Olho -->
    <circle cx="54.5" cy="45" r="0.8" fill="#ffffff" />

    <!-- Bico Angular Militar/Stealth -->
    <polygon points="62,48 92,48 88,56 60,56" fill="url(#runnerOrange)" stroke="#c2410c" stroke-width="0.8" />
    <!-- Divisão do bico -->
    <line x1="62" y1="52" x2="88" y2="52" stroke="#7c2d12" stroke-width="1" />
  </g>
</svg>
