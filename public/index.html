<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Data Runner · Backtest</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        media="print"
        onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
  </noscript>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/styles/tokens.css?v=8" />
  <link rel="stylesheet" href="/styles.css?v=54" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css" />
</head>
<body>
  <div id="app" class="app">
    <aside class="sidebar" aria-label="Navegação principal">
      <div class="sidebar__brand">
        <div class="sidebar__logo" aria-hidden="true">
          <img class="sidebar__logo-img" src="/favicon.svg" alt="Data Runner Logo" />
        </div>
        <div>
          <div class="sidebar__title">Data Runner</div>
          <div class="sidebar__subtitle">GoldenLens · Backtest</div>
        </div>
      </div>

      <nav class="sidebar__nav">
        <a class="navlink" href="#/overview" data-route="overview">
          <span class="navlink__icon" aria-hidden="true"><i class="fa-solid fa-chart-simple"></i></span>
          <span class="navlink__label">Visão Geral</span>
        </a>
        <a class="navlink" href="#/studio" data-route="studio">
          <span class="navlink__icon" aria-hidden="true"><i class="fa-solid fa-wand-magic-sparkles"></i></span>
          <span class="navlink__label">Estúdio</span>
        </a>
        <a class="navlink" href="#/strategies" data-route="strategies">
          <span class="navlink__icon" aria-hidden="true"><i class="fa-solid fa-chess-knight"></i></span>
          <span class="navlink__label">Estratégias</span>
        </a>
        <a class="navlink" href="#/data" data-route="data">
          <span class="navlink__icon" aria-hidden="true"><i class="fa-solid fa-database"></i></span>
          <span class="navlink__label">Dados</span>
        </a>
        <a class="navlink" href="#/settings" data-route="settings">
          <span class="navlink__icon" aria-hidden="true"><i class="fa-solid fa-gear"></i></span>
          <span class="navlink__label">Configurações</span>
        </a>
      </nav>

      <div class="sidebar__footer">
        <div class="sidebar__user">
          <span class="dot dot--ok connection-dot" aria-hidden="true"></span>
          <span class="connection-label">Conectando…</span>
        </div>
        <button class="btn btn--ghost btn--sm logout-btn" type="button" data-action="logout">Sair</button>
      </div>
    </aside>

    <header class="topbar">
      <button id="menu-btn" class="menu-btn" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="mobile-nav">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
      <button id="nav-back" class="topbar__back" type="button" hidden aria-label="Voltar"><i class="fa-solid fa-arrow-left"></i></button>
      <div class="topbar__crumbs">
        <button id="crumb-section" class="topbar__crumb-link" type="button">Visão Geral</button>
        <span class="topbar__sep" id="crumb-sep" hidden>›</span>
        <span id="crumb-detail" class="topbar__detail" hidden></span>
      </div>
      <div class="topbar__actions" id="topbar-actions"></div>
    </header>

    <main class="content" id="content" aria-live="polite"></main>
  </div>

  <div id="mobile-nav" class="mobile-nav" aria-hidden="true" inert>
    <div class="mobile-nav__backdrop" tabindex="-1" aria-hidden="true"></div>
    <aside class="mobile-nav__panel" aria-label="Menu">
      <div class="mobile-nav__header">
        <div class="sidebar__brand mobile-nav__brand">
          <div class="sidebar__logo" aria-hidden="true">
            <img class="sidebar__logo-img" src="/favicon.svg" alt="" />
          </div>
          <div>
            <div class="sidebar__title">Data Runner</div>
            <div class="sidebar__subtitle">GoldenLens · Backtest</div>
          </div>
        </div>
        <button class="mobile-nav__close btn btn--icon btn--ghost" type="button" aria-label="Fechar"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <nav class="mobile-nav__links">
        <a class="navlink" href="#/overview" data-route="overview"><span class="navlink__icon"><i class="fa-solid fa-chart-simple"></i></span><span class="navlink__label">Visão Geral</span></a>
        <a class="navlink" href="#/studio" data-route="studio"><span class="navlink__icon"><i class="fa-solid fa-wand-magic-sparkles"></i></span><span class="navlink__label">Estúdio</span></a>
        <a class="navlink" href="#/strategies" data-route="strategies"><span class="navlink__icon"><i class="fa-solid fa-chess-knight"></i></span><span class="navlink__label">Estratégias</span></a>
        <a class="navlink" href="#/data" data-route="data"><span class="navlink__icon"><i class="fa-solid fa-database"></i></span><span class="navlink__label">Dados</span></a>
        <a class="navlink" href="#/settings" data-route="settings"><span class="navlink__icon"><i class="fa-solid fa-gear"></i></span><span class="navlink__label">Configurações</span></a>
      </nav>
      <div class="mobile-nav__footer">
        <div class="sidebar__user">
          <span class="dot dot--ok connection-dot" aria-hidden="true"></span>
          <span class="connection-label">Conectando…</span>
        </div>
        <button class="btn btn--ghost btn--sm logout-btn" type="button" data-action="logout">Sair</button>
      </div>
    </aside>
  </div>

  <div id="modal-root" aria-hidden="true"></div>
  <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
  <script type="module" src="/app.js?v=57"></script>
</body>
</html>
